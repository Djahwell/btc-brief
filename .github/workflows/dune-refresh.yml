name: Refresh Dune Cache (no Claude call)

# ─────────────────────────────────────────────────────────────────────────────
# Keeps public/dune_cache.json warm for the on-demand brief-generate workflow.
# Does NOT call Anthropic — that's done by brief-generate.yml on first use
# of the day, triggered by the Cloudflare Worker.
#
# Runs every 6h so the Dune MVRV query (which takes ~10 min) isn't a
# bottleneck when the user opens the app for the first time that day.
# ─────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  refresh-dune:
    runs-on: ubuntu-latest
    timeout-minutes: 30       # Dune MVRV ~10min + Playwright ~2min

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Create .env from secrets
        run: |
          echo "VITE_DUNE_API_KEY=${{ secrets.VITE_DUNE_API_KEY }}" > .env

      - name: Run Dune worker
        run: node dune-worker.js

      # ── Preserve all_data.json so dune-refresh doesn't wipe it from gh-pages ──
      # brief-generate.yml generates all_data.json and deploys it to gh-pages.
      # dune-refresh only generates dune_cache.json, but the deploy action uses
      # single-commit mode which replaces all gh-pages content with the public/
      # folder. Without this step, all_data.json is deleted every 6h.
      - name: Preserve all_data.json from GitHub Pages
        run: |
          mkdir -p public
          curl --fail --silent --show-error \
            -o public/all_data.json \
            "https://djahwell.github.io/btc-brief/all_data.json" \
            && echo "[ok] Preserved all_data.json from gh-pages" \
            || echo "[warn] all_data.json not yet on gh-pages — will be created by brief-generate.yml"

      - name: Deploy dune_cache.json to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: public
          commit-message: 'chore: refresh dune_cache [skip ci]'
          single-commit: true
