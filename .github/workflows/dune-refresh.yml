name: Refresh Dune Cache

# ─── Triggers ──────────────────────────────────────────────────────────────────
on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours (00:00, 06:00, 12:00, 18:00 UTC)
  workflow_dispatch:          # adds a "Run workflow" button in the GitHub UI

# ─── Permissions (needed for GitHub Pages deploy) ──────────────────────────────
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  refresh-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30       # Dune MVRV query can take ~10 min; Playwright adds more

    steps:
      # 1. Get the code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Node.js 20 (same engine as local dev)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Install JS dependencies
      - name: Install npm dependencies
        run: npm ci

      # 4. Install Chromium for Playwright
      #    --with-deps installs the OS-level libraries Chromium needs on Ubuntu
      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      # 5. Write .env so dune-worker.js can find the key
      - name: Create .env from secrets
        run: |
          echo "VITE_DUNE_API_KEY=${{ secrets.VITE_DUNE_API_KEY }}" > .env

      # 6. Run the worker — writes public/dune_cache.json
      - name: Run Dune worker
        run: node dune-worker.js

      # 7. Deploy the public/ folder to GitHub Pages
      #    After first run, the cache will be live at:
      #    https://djahwell.github.io/btc-brief/dune_cache.json
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages          # Pages will serve from this branch
          folder: public            # contents of public/ become the site root
          commit-message: 'chore: refresh dune cache [skip ci]'
          single-commit: true       # keeps gh-pages lean (no history buildup)
