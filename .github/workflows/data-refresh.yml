name: Refresh All Data Cache (no Claude call)

# ─────────────────────────────────────────────────────────────────────────────
# Keeps public/all_data.json warm for the on-demand brief-generate workflow.
# Does NOT call Anthropic — that's done by brief-generate.yml on first use
# of the day, triggered by the Cloudflare Worker.
#
# Lean refactor (2026-04-25): runs node data-worker.js (renamed from
# dune-worker.js) which now fetches Dune + Binance + DefiLlama + Yahoo +
# Stooq + Coinbase + Deribit + FRED + CME + CoinMetrics — i.e. ALL non-Claude
# data — into a single public/all_data.json. brief-worker.js then reads
# that file, calls Claude once, and writes the brief back.
#
# History archive (2026-04-25): every cron cycle ALSO snapshots all_data.json
# to public/history/YYYY-MM-DD-HH.json (UTC) for back-testing and trend
# visualization. The history/ folder is preserved across deploys by checking
# out the existing gh-pages branch first and copying its history/ in.
#
# Runs every 6h so the slow Dune MVRV query (~10 min) isn't a bottleneck
# when the user opens the app for the first time that day.
# ─────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours (00, 06, 12, 18 UTC)
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  refresh-data:
    runs-on: ubuntu-latest
    timeout-minutes: 30       # Dune MVRV ~10min + Playwright ~2min

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Checkout gh-pages branch into _gh-pages/ for cache + history seed ──
      # We need both:
      #   1. The current all_data.json (to preserve `brief` + `briefCachedAt`
      #      across cron cycles via data-worker.js's writeCache).
      #   2. The full history/ folder (every prior snapshot), since the deploy
      #      below uses single-commit mode which REPLACES gh-pages content
      #      with whatever's in public/. Without re-seeding history/, we'd
      #      wipe the archive on every cron run.
      # continue-on-error: true so the very first deploy (when gh-pages
      # doesn't exist yet) doesn't fail the workflow.
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: _gh-pages
        continue-on-error: true

      - name: Seed public/ from gh-pages (all_data.json + history/)
        run: |
          mkdir -p public public/history
          if [ -d "_gh-pages" ]; then
            if [ -f "_gh-pages/all_data.json" ]; then
              cp _gh-pages/all_data.json public/all_data.json
              echo "[ok] Seeded public/all_data.json (preserves brief + briefCachedAt)"
            else
              echo "[info] No prior all_data.json on gh-pages — data-worker will create it fresh"
            fi
            if [ -d "_gh-pages/history" ]; then
              cp -r _gh-pages/history/. public/history/
              SEEDED=$(find public/history -name '*.json' -not -name 'index.json' | wc -l)
              echo "[ok] Seeded $SEEDED prior snapshots into public/history/"
            else
              echo "[info] No prior history/ on gh-pages — starting archive from scratch"
            fi
            rm -rf _gh-pages
          else
            echo "[warn] _gh-pages/ checkout failed — first-time deploy?"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Create .env from secrets
        run: |
          echo "VITE_DUNE_API_KEY=${{ secrets.VITE_DUNE_API_KEY }}" > .env
          echo "VITE_NEWS_API_KEY=${{ secrets.VITE_NEWS_API_KEY }}" >> .env

      - name: Run data worker
        env:
          VITE_DUNE_API_KEY: ${{ secrets.VITE_DUNE_API_KEY }}
          VITE_NEWS_API_KEY: ${{ secrets.VITE_NEWS_API_KEY }}
        run: node data-worker.js

      # ── Binance 24h whale pressure — curl Worker directly (Node fetch unreliable on GHA) ──
      # data-worker.js attempts this via Node fetch but it silently fails on GHA runners.
      # curl to Cloudflare Workers is reliable from GHA. scripts/merge_whale.py merges
      # the result into the already-written all_data.json so it's included in the deploy.
      - name: Fetch Binance whale data via Worker
        run: |
          echo "=== Fetching whale data from CF Worker ==="
          HTTP_CODE=$(curl --max-time 20 --write-out "%{http_code}" \
            --silent \
            "https://btc-brief.joel-toe.workers.dev/whale" \
            -o /tmp/whale.json) || HTTP_CODE="CURL_FAILED"
          echo "HTTP status: $HTTP_CODE"
          if [ -f /tmp/whale.json ]; then
            echo "=== /tmp/whale.json contents ==="
            cat /tmp/whale.json
            echo ""
            echo "================================"
            python3 scripts/merge_whale.py
          else
            echo "[warn] curl did not create /tmp/whale.json"
          fi

      # ── Snapshot to history/ ────────────────────────────────────────────────
      # Captures all_data.json (now containing fresh data + whale + preserved
      # brief from prior cycle) into public/history/YYYY-MM-DD-HH.json and
      # rebuilds public/history/index.json.
      - name: Snapshot all_data.json to history/
        run: node scripts/snapshot_history.js

      - name: Deploy all_data.json + history/ to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: public
          commit-message: 'chore: refresh all_data + snapshot [skip ci]'
          single-commit: true
