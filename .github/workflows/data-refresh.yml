name: Refresh All Data Cache (no Claude call)

# ─────────────────────────────────────────────────────────────────────────────
# Keeps public/all_data.json warm for the on-demand brief-generate workflow.
# Does NOT call Anthropic — that's done by brief-generate.yml on first use
# of the day, triggered by the Cloudflare Worker.
#
# Lean refactor (2026-04-25): runs node data-worker.js (renamed from
# dune-worker.js) which now fetches Dune + Binance + DefiLlama + Yahoo +
# Stooq + Coinbase + Deribit + FRED + CME + CoinMetrics — i.e. ALL non-Claude
# data — into a single public/all_data.json. brief-worker.js then reads
# that file, calls Claude once, and writes the brief back.
#
# Runs every 6h so the slow Dune MVRV query (~10 min) isn't a bottleneck
# when the user opens the app for the first time that day.
# ─────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  refresh-data:
    runs-on: ubuntu-latest
    timeout-minutes: 30       # Dune MVRV ~10min + Playwright ~2min

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Create .env from secrets
        run: |
          echo "VITE_DUNE_API_KEY=${{ secrets.VITE_DUNE_API_KEY }}" > .env

      # ── Pull the existing all_data.json from gh-pages BEFORE running data-worker ──
      # data-worker.js's writeCache reads the existing file to preserve
      # `brief` + `briefCachedAt` across cron cycles (so an interrupted
      # data-worker run never clobbers the most recent Claude brief, and the
      # brief stays visible on the dashboard between Claude runs).
      # We deploy via single-commit mode below, which replaces gh-pages content,
      # so we must seed the local public/ folder with the live deployed copy.
      - name: Seed public/all_data.json from GitHub Pages
        run: |
          mkdir -p public
          curl --fail --silent --show-error \
            -o public/all_data.json \
            "https://djahwell.github.io/btc-brief/all_data.json" \
            && echo "[ok] Seeded public/all_data.json from gh-pages (preserves brief + briefCachedAt)" \
            || echo "[warn] all_data.json not yet on gh-pages — data-worker will create it fresh"

      - name: Run data worker
        run: node data-worker.js

      # ── Binance 24h whale pressure — curl Worker directly (Node fetch unreliable on GHA) ──
      # data-worker.js attempts this via Node fetch but it silently fails on GHA runners.
      # curl to Cloudflare Workers is reliable from GHA. scripts/merge_whale.py merges
      # the result into the already-written all_data.json so it's included in the deploy.
      - name: Fetch Binance whale data via Worker
        run: |
          echo "=== Fetching whale data from CF Worker ==="
          HTTP_CODE=$(curl --max-time 20 --write-out "%{http_code}" \
            --silent \
            "https://btc-brief.joel-toe.workers.dev/whale" \
            -o /tmp/whale.json) || HTTP_CODE="CURL_FAILED"
          echo "HTTP status: $HTTP_CODE"
          if [ -f /tmp/whale.json ]; then
            echo "=== /tmp/whale.json contents ==="
            cat /tmp/whale.json
            echo ""
            echo "================================"
            python3 scripts/merge_whale.py
          else
            echo "[warn] curl did not create /tmp/whale.json"
          fi

      - name: Deploy all_data.json to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: public
          commit-message: 'chore: refresh all_data [skip ci]'
          single-commit: true
