name: Generate Brief (on-demand · calls Anthropic)

# ─────────────────────────────────────────────────────────────────────────────
# Runs ONLY when triggered by:
#   - The Cloudflare Worker (`btc-brief`) on the first APK open of the day
#   - A human pressing "Run workflow" in the GitHub Actions UI
#
# There is NO cron here. If nobody opens the app on a given day, the
# Anthropic API is never called.
#
# Flow:
#   1. Pulls the latest all_data.json from GitHub Pages (kept fresh by
#      data-refresh.yml every 6h — contains market, tech, options, macros,
#      cme, coinMetrics, mvrv, etfFlow, lthData, stablecoinSupply,
#      exchangeFlow, binanceLargeTrades).
#   2. Runs brief-worker.js — reads all_data.json and calls Claude ONCE.
#      Aborts WITHOUT calling Anthropic if all_data.json is missing or
#      market.price is missing (lean refactor 2026-04-25).
#   3. Deploys updated public/all_data.json to GitHub Pages with the brief.
#   4. The Worker's next GET /brief returns the fresh data; APK clients
#      polling with `regenerating: true` see briefCachedAt flip to today
#      and auto-refresh.
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate-brief:
    runs-on: ubuntu-latest
    timeout-minutes: 15       # all_data.json read ~5s + Claude ~3min + headroom

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      # Pull the latest all_data.json directly from the gh-pages git branch.
      # We use raw.githubusercontent.com (not djahwell.github.io) to bypass the
      # GitHub Pages CDN cache — the CDN can serve a stale copy for up to 10 min
      # after data-refresh deploys, causing brief-worker to read old data.
      - name: Fetch latest all_data.json
        run: |
          mkdir -p public
          curl --fail --silent --show-error \
            -H "Cache-Control: no-cache" \
            -o public/all_data.json \
            "https://raw.githubusercontent.com/Djahwell/btc-brief/gh-pages/all_data.json?t=$(date +%s)" || \
          { echo "[fatal] all_data.json unavailable — brief-worker will abort without calling Anthropic"; exit 1; }

      - name: Create .env from secrets
        run: |
          echo "VITE_ANTHROPIC_API_KEY=${{ secrets.VITE_ANTHROPIC_API_KEY }}" > .env

      - name: Run Brief worker (Claude brief only)
        run: node brief-worker.js

      - name: Deploy all_data.json to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: public
          commit-message: 'chore: refresh brief [skip ci]'
          single-commit: true
